image:
  repository: ""  # injected by CI
  tag: ""         # injected by CI

envSecret:
  ODH_CLIENT_SECRET: ""  # injected by CI

env:
  ODH_AUTHENTICATION_URL: "https://auth.opendatahub.com/auth/"
  ODH_BASE_READER_URL: "https://mobility.api.opendatahub.com"
  ODH_BASE_WRITER_URL: "https://mobility.share.opendatahub.com"
  ODH_CLIENT_ID: "odh-a22-dataprocessor"
  PROVENANCE_VERSION: ""  # injected by CI

jobs:
  validator:
    schedule: "0 2 * * *"
    command: ["python", "-m", "validator.main"]
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        memory: "1Gi"

  pollution-computer:
    schedule: "0 4 * * *"
    command: ["python", "-m", "pollution_computer.main"]
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        memory: "1Gi"

  road-weather:
    schedule: "0 */3 * * *"
    command: ["python", "-m", "road_weather.main"]
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
      limits:
        memory: "512Mi"

  pollution-dispersal:
    schedule: "0 * * * *"
    command: ["python", "-m", "pollution_dispersal.main"]
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        memory: "2Gi"

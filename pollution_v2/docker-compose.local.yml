#
# Local test override — runs jobs in dry-run mode (reads from ODH, never writes).
# Pair with a .env that points at the test ODH environment.
#
# One-shot (recommended for local testing):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml run --rm validator
#   docker compose -f docker-compose.yml -f docker-compose.local.yml run --rm pollution-computer
#   docker compose -f docker-compose.yml -f docker-compose.local.yml run --rm road-weather
#   docker compose -f docker-compose.yml -f docker-compose.local.yml run --rm pollution-dispersal
#
# All jobs on cron (without --no-deps):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# The CRON_SCHEDULE env var is intentionally not overridden here so it still comes
# from your .env file (or the default). Set it to a very frequent schedule if you
# want to observe repeated runs without waiting.

services:

  validator:
    environment:
      ODH_DRY_RUN: "true"
      # Narrow the processing window so the first run completes quickly
      ODH_MINIMUM_STARTING_DATE: "2024-06-01"
      ODH_COMPUTATION_BATCH_SIZE_VALIDATION: "1"

  pollution-computer:
    environment:
      ODH_DRY_RUN: "true"
      ODH_MINIMUM_STARTING_DATE: "2024-06-01"
      ODH_COMPUTATION_BATCH_SIZE_POLL_ELABORATION: "1"

  road-weather:
    environment:
      ODH_DRY_RUN: "true"

  pollution-dispersal:
    environment:
      ODH_DRY_RUN: "true"
      ODH_MINIMUM_STARTING_DATE: "2024-06-01"
      ODH_COMPUTATION_BATCH_SIZE_POLL_DISPERSAL: "1"

name: CI/CD ci-pollution-v2

on:
  push:
    paths:
      - "pollution_v2/**"
      - ".github/workflows/ci-pollution-v2.yml"
      - "!*.md"

env:
  PROJECT_NAME: el-pollution-v2
  WORKING_DIRECTORY: pollution_v2
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/el-pollution-v2
  DOCKER_TAG: ${{ github.sha }}
  KUBERNETES_NAMESPACE: collector
  K8S_NAME: el-pollution-v2

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml run --rm test

      - name: Lint Helm chart
        run: helm lint ${{ env.WORKING_DIRECTORY }}/infrastructure/helm

      - name: Validate Helm templates (test)
        run: |
          helm template ${{ env.K8S_NAME }} ${{ env.WORKING_DIRECTORY }}/infrastructure/helm \
            -f ${{ env.WORKING_DIRECTORY }}/infrastructure/helm/test.yaml

      - name: Validate Helm templates (prod)
        run: |
          helm template ${{ env.K8S_NAME }} ${{ env.WORKING_DIRECTORY }}/infrastructure/helm \
            -f ${{ env.WORKING_DIRECTORY }}/infrastructure/helm/prod.yaml

  build:
    runs-on: ubuntu-24.04
    needs: test
    concurrency: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build and push images
        uses: noi-techpark/github-actions/docker-build-and-push@v2
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/airflno'
    concurrency: deploy-test
    environment: test
    env:
      VALUES_YAML: infrastructure/helm/test.yaml
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Customize values.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          yq -i '.image.repository = "${{ env.DOCKER_IMAGE }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.tag = "${{ env.DOCKER_TAG }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.pullPolicy = "IfNotPresent"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.ODH_CLIENT_SECRET = "${{ secrets.COMBINED_CLIENT_SECRET_TEST }}"' ${{ env.VALUES_YAML }}
          yq -i '.env.PROVENANCE_VERSION = "${{ github.sha }}"' ${{ env.VALUES_YAML }}

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: ${{ env.K8S_NAME }}
          k8s-namespace: ${{ env.KUBERNETES_NAMESPACE }}
          chart-path: ${{ env.WORKING_DIRECTORY }}/infrastructure/helm
          values-file: ${{ env.WORKING_DIRECTORY }}/${{ env.VALUES_YAML }}
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_KEY_SECRET }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1

